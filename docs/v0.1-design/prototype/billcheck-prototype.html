<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>billcheck — clickable prototype (V0.1)</title>
<style>
  :root{
    --bg:#eef1f4; --app:#ffffff; --ink:#0f172a; --muted:#64748b; --line:#e6e9ee;
    --brand:#0d9488; --brand-ink:#0b7c71; --userbub:#0d9488; --agentbub:#f3f5f8;
    --hold:#0284c7; --holdbg:#e6f4fb; --ok:#16a34a; --okbg:#e7f7ec;
    --off:#dc2626; --offbg:#fdecec; --dispute:#9333ea; --disputebg:#f4ebfe;
    --need:#64748b; --needbg:#f1f3f6; --shadow:0 1px 2px rgba(16,24,40,.06),0 6px 20px rgba(16,24,40,.08);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);font:15px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);
       display:flex;align-items:center;justify-content:center;padding:16px;}
  .phone{width:100%;max-width:430px;height:min(880px,96vh);background:var(--app);border-radius:28px;overflow:hidden;
         display:flex;flex-direction:column;box-shadow:var(--shadow);border:1px solid var(--line);position:relative}
  /* header */
  .top{padding:14px 16px 10px;border-bottom:1px solid var(--line);background:#fff;z-index:2}
  .brandrow{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .brand{display:flex;align-items:center;gap:8px;font-weight:700;letter-spacing:-.2px}
  .dot{width:18px;height:18px;border-radius:6px;background:var(--brand);display:inline-block}
  .status{font-size:12px;font-weight:600;color:var(--muted);background:#f1f3f6;border:1px solid var(--line);
          padding:4px 9px;border-radius:999px;white-space:nowrap}
  .cases{display:flex;gap:6px;margin-top:10px;overflow:auto;-webkit-overflow-scrolling:touch}
  .casebtn{flex:0 0 auto;font-size:12px;font-weight:600;color:var(--muted);background:#fff;border:1px solid var(--line);
           padding:6px 10px;border-radius:999px;cursor:pointer}
  .casebtn.on{color:#fff;background:var(--brand);border-color:var(--brand)}
  /* thread */
  .thread{flex:1;overflow:auto;padding:16px 14px 8px;-webkit-overflow-scrolling:touch;background:linear-gradient(#fff,#fbfcfd)}
  .row{display:flex;margin:10px 0;animation:rise .22s ease}
  @keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .row.user{justify-content:flex-end}
  .bub{max-width:84%;padding:10px 13px;border-radius:16px;box-shadow:var(--shadow)}
  .row.agent .bub{background:var(--agentbub);border-bottom-left-radius:5px}
  .row.user .bub{background:var(--userbub);color:#fff;border-bottom-right-radius:5px}
  .who{font-size:11px;font-weight:700;color:var(--muted);margin:0 6px 3px}
  /* doc chips */
  .docs{display:flex;flex-direction:column;gap:6px}
  .doc{display:flex;align-items:center;gap:9px;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.35);
       padding:8px 10px;border-radius:11px;cursor:pointer}
  .row.agent .doc{background:#fff;border-color:var(--line)}
  .doc .ic{font-size:18px}
  .doc .nm{font-weight:600;font-size:13px}
  .doc .sub{font-size:11px;opacity:.8}
  /* cards */
  .card{max-width:92%;background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);overflow:hidden}
  .vhead{display:flex;gap:10px;align-items:flex-start;padding:13px 14px}
  .vicon{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;font-size:16px;flex:0 0 auto;color:#fff}
  .vtitle{font-weight:700;letter-spacing:-.2px}
  .vlabel{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
  .vbody{padding:0 14px 12px;color:#334155;font-size:14px}
  .why{margin:6px 14px 12px;font-size:13px}
  .why summary{cursor:pointer;color:var(--brand-ink);font-weight:600;list-style:none}
  .why summary::-webkit-details-marker{display:none}
  .why summary::before{content:"⌄ ";font-weight:800}
  .why[open] summary::before{content:"⌃ "}
  .why .det{margin-top:6px;color:#475569}
  .basis{display:flex;gap:6px;align-items:center;margin:0 14px 13px;font-size:11.5px;color:var(--muted)}
  .basis .tag{background:#f1f3f6;border:1px solid var(--line);border-radius:6px;padding:2px 7px;font-weight:600}
  /* amounts */
  .amt{border-top:1px solid var(--line);padding:11px 14px}
  .amt h4{margin:0 0 8px;font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
  .amt table{width:100%;border-collapse:collapse;font-variant-numeric:tabular-nums}
  .amt td{padding:5px 0;font-size:13.5px}
  .amt td.lab{color:#475569}
  .amt td.val{text-align:right;font-weight:600;font-feature-settings:"tnum"}
  .amt td.prov{font-size:10.5px;color:var(--muted);padding-left:8px;white-space:nowrap}
  .amt tr.tot td{border-top:2px solid var(--ink);padding-top:8px;font-size:16px;font-weight:800}
  .amt tr.tot td.lab{color:var(--ink)}
  .amt .note{margin-top:8px;font-size:11.5px;color:var(--muted)}
  /* options list */
  .opts{border-top:1px solid var(--line);padding:10px 14px}
  .opts h4{margin:0 0 7px;font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
  .opt{display:flex;gap:8px;align-items:baseline;padding:4px 0;font-size:13.5px}
  .opt .rank{font-weight:800;color:var(--brand-ink)}
  .opt .odds{margin-left:auto;font-size:11px;color:var(--muted);white-space:nowrap}
  /* confirm card */
  .confirm{border-top:1px solid var(--line)}
  .letter{margin:11px 14px;background:#fafbfc;border:1px solid var(--line);border-radius:11px;padding:11px 12px;font-size:12.5px;color:#334155}
  .letter .lh{font-weight:700;color:var(--ink);margin-bottom:5px}
  .letter b.num{background:#fff5d6;border-radius:4px;padding:0 3px}
  .prov-note{margin:0 14px 10px;font-size:11.5px;color:var(--brand-ink);font-weight:600}
  .cbtns{display:flex;gap:8px;padding:0 14px 13px;flex-wrap:wrap}
  /* activity */
  .act{border-top:1px solid var(--line);padding:11px 14px}
  .act h4{margin:0 0 8px;font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
  .act .e{display:flex;gap:9px;padding:3px 0;font-size:12.5px}
  .act .t{color:var(--muted);flex:0 0 52px;font-variant-numeric:tabular-nums}
  .act .d{color:#334155}
  .act .e .mk{color:var(--brand)}
  /* typing */
  .typing{display:inline-flex;gap:4px;padding:12px 14px}
  .typing i{width:7px;height:7px;border-radius:50%;background:#c2c9d3;animation:bl 1s infinite}
  .typing i:nth-child(2){animation-delay:.2s}.typing i:nth-child(3){animation-delay:.4s}
  @keyframes bl{0%,80%,100%{opacity:.3}40%{opacity:1}}
  /* composer */
  .composer{border-top:1px solid var(--line);background:#fff;padding:9px 12px 12px}
  .chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:9px}
  .chip{font-size:13px;font-weight:600;border:1px solid var(--brand);color:var(--brand-ink);background:#fff;
        padding:9px 13px;border-radius:999px;cursor:pointer;line-height:1}
  .chip.primary{background:var(--brand);color:#fff}
  .chip.ghost{border-color:var(--line);color:var(--muted)}
  .chip:active{transform:scale(.97)}
  .inputrow{display:flex;align-items:center;gap:8px;background:#f1f3f6;border:1px solid var(--line);border-radius:999px;padding:8px 12px;color:var(--muted)}
  .inputrow .plus{font-size:20px;font-weight:600;color:var(--muted)}
  .inputrow .ph{flex:1;font-size:13px}
  .inputrow .mic{font-size:16px;opacity:.7}
  .demolabel{position:absolute;top:10px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:700;color:#fff;
             background:#0f172a;opacity:.75;border-radius:999px;padding:2px 9px;z-index:3}
  .empty{margin:8px 6px;color:var(--muted);font-size:13.5px}
</style>
</head>
<body>
<div class="phone" role="application" aria-label="billcheck prototype">
  <div class="demolabel">PROTOTYPE · mocked data</div>
  <header class="top">
    <div class="brandrow">
      <div class="brand"><span class="dot"></span> billcheck</div>
      <div class="status" id="status">New</div>
    </div>
    <div class="cases" id="cases"></div>
  </header>
  <main class="thread" id="thread" aria-live="polite" aria-label="conversation"></main>
  <footer class="composer">
    <div class="chips" id="chips"></div>
    <div class="inputrow"><span class="plus">+</span><span class="ph" id="ph">Message billcheck…</span><span class="mic" title="dictation (voice = speech-to-text, fast-follow)">🎙️</span></div>
  </footer>
</div>

<script>
/* ---------- helpers to build cards ---------- */
const V = {
  hold:   {cls:'hold',   bg:'--holdbg',   c:'--hold',   ic:'⏳', label:'Hold — don’t pay yet'},
  ok:     {cls:'ok',     bg:'--okbg',     c:'--ok',     ic:'✓',  label:'Looks correct'},
  off:    {cls:'off',    bg:'--offbg',    c:'--off',    ic:'!',  label:'Something looks off'},
  dispute:{cls:'dispute',bg:'--disputebg',c:'--dispute',ic:'⚑', label:'Let’s dispute this'},
  need:   {cls:'need',   bg:'--needbg',   c:'--need',   ic:'?',  label:'Need one more thing'},
};
const cssv = n => getComputedStyle(document.documentElement).getPropertyValue(n);

function verdictCard(o){ // {v, title, why, basis:[], amounts?, options?}
  const v=V[o.v];
  let h=`<div class="card">
    <div class="vhead" style="background:${cssv(v.bg)}">
      <div class="vicon" style="background:${cssv(v.c)}">${v.ic}</div>
      <div><div class="vlabel" style="color:${cssv(v.c)}">${v.label}</div><div class="vtitle">${o.title}</div></div>
    </div>`;
  if(o.why) h+=`<details class="why"><summary>Why? / say more</summary><div class="det">${o.why}</div></details>`;
  if(o.basis) h+=`<div class="basis">📎 ${o.basis.map(b=>`<span class="tag">${b}</span>`).join(' ')}</div>`;
  if(o.amounts) h+=amountsHTML(o.amounts);
  if(o.options) h+=optionsHTML(o.options);
  return h+`</div>`;
}
function amountsHTML(a){ // {rows:[{lab,val,prov}], total:{lab,val}, note}
  let r=a.rows.map(x=>`<tr><td class="lab">${x.lab}</td><td class="val">${x.val}</td><td class="prov">${x.prov?('· '+x.prov):''}</td></tr>`).join('');
  return `<div class="amt"><h4>The amounts</h4><table>${r}
    <tr class="tot"><td class="lab">${a.total.lab}</td><td class="val">${a.total.val}</td><td></td></tr></table>
    ${a.note?`<div class="note">${a.note}</div>`:''}</div>`;
}
function optionsHTML(o){ // [{rank,text,odds}]
  return `<div class="opts"><h4>Your options, best first</h4>${o.map(x=>
    `<div class="opt"><span class="rank">${x.rank}</span><span>${x.text}</span><span class="odds">${x.odds||''}</span></div>`).join('')}</div>`;
}
function confirmCard(o){ // {title, subject, body, prov, approve}
  return `<div class="card">
    <div class="vhead" style="background:${cssv('--needbg')}"><div class="vicon" style="background:#475569">✎</div>
      <div><div class="vlabel" style="color:#475569">Draft — needs your OK</div><div class="vtitle">${o.title}</div></div></div>
    <div class="letter"><div class="lh">${o.subject}</div>${o.body}</div>
    <div class="prov-note">🔒 Every dollar figure here comes from your bill — nothing invented.</div>
    <div class="cbtns">
      <button class="chip primary" data-approve>✓ Approve &amp; send</button>
      <button class="chip ghost" data-aside="Open the editor (demo)">✎ Edit</button>
      <button class="chip ghost" data-aside="No problem — I won’t send anything.">Cancel</button>
    </div></div>`;
}
function activityCard(a){ // [{t,d,mark}]
  return `<div class="card"><div class="act"><h4>Activity — your paper trail</h4>${
    a.map(e=>`<div class="e"><span class="t">${e.t}</span><span class="d">${e.mark?'<span class="mk">●</span> ':''}${e.d}</span></div>`).join('')}</div></div>`;
}
function docHTML(docs){ return `<div class="docs">${docs.map(d=>
  `<div class="doc"><span class="ic">${d.ic||'📄'}</span><div><div class="nm">${d.nm}</div><div class="sub">${d.sub}</div></div></div>`).join('')}</div>`; }

/* ---------- the scripted cases ---------- */
const CASES = {
  c1:{ tab:'1 · Hold → OK', status:'New', start:[
    {role:'agent', html:`Hi — I’m billcheck. Send me a medical bill, statement, or EOB (a photo or PDF is fine), or just tell me what’s going on.`},
    {role:'agent', html:`<div class="empty">Try: “a $400 bill I don’t understand”, or upload a document below 👇</div>`},
    {gate:{ph:'Upload a document…', primary:{label:'📄 Upload a statement', docs:[{nm:'Statement — Northwest Imaging',sub:'PDF · 1 page · balance due $1,200'}]},
      asides:[{label:'What can you do?', reply:`I read your bills, tell you whether to pay or push back, and can draft the letters. All the numbers I show come straight from your documents.`}]}},
    {role:'agent', status:'Gathering', card:()=>verdictCard({v:'hold',
      title:`Hold off — this is a statement, not the final bill.`,
      why:`It’s a summary (no itemized lines), and your insurer hasn’t finished processing it — there’s no EOB yet. Paying now risks overpaying before insurance is applied.`,
      basis:['document type = statement','no EOB on file']})},
    {role:'agent', html:`Two things will tell us the real number: the <b>itemized bill</b> and the <b>EOB</b> (“this is not a bill”) from your insurer. Want me to watch for them?`},
    {gate:{ph:'Reply…', primary:{label:'📄 I have the itemized bill + EOB', docs:[{nm:'Itemized bill — Northwest Imaging',sub:'PDF · 1 page'},{nm:'EOB — BlueCross',sub:'PDF · 1 page · MRI, left knee'}]},
      asides:[{label:'🔔 Just remind me later', reply:`Done — I’ll check back in a few days and nudge the provider if the EOB is slow.`}]}},
    {role:'agent', status:'Reviewed', card:()=>verdictCard({v:'ok',
      title:`This checks out — you’re fine to pay $30.`,
      why:`In-network MRI. Your plan’s allowed amount was $480, the plan paid $450, leaving a $30 copay — and the provider billed exactly $30. No duplicates, no coding flags.`,
      basis:['EOB cost-share = bill','in-network','engine: 0 findings'],
      amounts:{rows:[
        {lab:'Provider billed',val:'$1,200.00',prov:'itemized bill'},
        {lab:'Plan allowed',val:'$480.00',prov:'EOB'},
        {lab:'Plan paid',val:'$450.00',prov:'EOB'}],
        total:{lab:'You owe',val:'$30.00'}, note:'The $1,200 “charge” is the list price — you never owe that in-network.'}})},
    {gate:{ph:'Reply…', primary:{label:'Got it, thanks!'},
      asides:[{label:'Why was the charge $1,200?', reply:`That’s the hospital’s list price (chargemaster). Your insurer’s negotiated “allowed” rate is what counts — here $480 — and after the plan paid, your share is the $30 copay.`}]}},
    {role:'agent', status:'Resolved', html:`👍 You’re all set. I’ll keep this in your case in case a corrected bill ever shows up.`},
  ]},

  c2:{ tab:'2 · Dispute', status:'New', start:[
    {role:'agent', html:`Send the bill you’re worried about — a photo or PDF works. I’ll check it line by line.`},
    {gate:{ph:'Upload a document…', primary:{label:'📄 Upload itemized bill + EOB', docs:[{nm:'Itemized bill — City ER',sub:'PDF · 2 pages'},{nm:'EOB — Aetna',sub:'PDF · 1 page'}]}}},
    {role:'agent', status:'Reviewed', card:()=>verdictCard({v:'off',
      title:`Something looks off — you may be overpaying about $450.`,
      why:`The ER visit code (CPT 99284) appears <b>twice</b> — lines 4 and 7, $450 each — for a single visit. Billing the same evaluation code twice isn’t allowed (NCCI). One of them looks like a duplicate.`,
      basis:['itemized bill: lines 4 & 7','engine: duplicate (NCCI)'],
      amounts:{rows:[
        {lab:'Provider billed',val:'$2,310.00',prov:'itemized bill'},
        {lab:'Plan allowed',val:'$1,240.00',prov:'EOB'},
        {lab:'Plan paid',val:'$620.00',prov:'EOB'},
        {lab:'Disputed (duplicate)',val:'$450.00',prov:'finding'}],
        total:{lab:'They say you owe',val:'$620.00'}},
      options:[
        {rank:'1.',text:'Draft a dispute letter (cite the duplicate)',odds:'strong'},
        {rank:'2.',text:'Call the billing office with the line numbers',odds:'medium'},
        {rank:'3.',text:'Request a corrected itemized bill',odds:'medium'}]})},
    {role:'agent', html:`The duplicate is well-documented, so a written dispute is your best shot. Want me to draft it?`},
    {gate:{ph:'Reply…', primary:{label:'✍️ Draft the dispute letter'},
      asides:[{label:'How sure are you?', reply:`High confidence on the duplicate — the same CPT on two lines for one visit is a clear NCCI flag. I’m only flagging the $450 duplicate, not the rest of the bill.`}]}},
    {gate:{ph:'Review the draft…', card:()=>confirmCard({
      title:`Dispute letter to City ER billing`,
      subject:`Re: Account #4471 — duplicate charge, date of service 03/14`,
      body:`…Your itemized statement lists CPT <b class="num">99284</b> twice (lines 4 and 7) at <b class="num">$450.00</b> each for a single emergency visit. Per NCCI, this evaluation code is billable once. I request removal of the duplicate <b class="num">$450.00</b> charge and a corrected statement…`})}},
    {role:'agent', status:'Acting', html:`Sent. ✅ I’ve logged everything and set a follow-up for 14 days.`},
    {role:'agent', card:()=>activityCard([
      {t:'10:02', d:'Uploaded itemized bill + EOB'},
      {t:'10:02', d:'Engine: duplicate CPT 99284 ($450)', mark:1},
      {t:'10:05', d:'Drafted dispute letter (figures from bill)'},
      {t:'10:06', d:'You approved & sent', mark:1},
      {t:'+14d', d:'Follow-up scheduled'}])},
    {gate:{ph:'Reply…', primary:{label:'Perfect'}, asides:[]}},
    {role:'agent', html:`I’ll chase it and let you know when they respond. If they push back, the next step is your state insurance regulator — I’ll draft that too.`},
  ]},

  c3:{ tab:'3 · “I was charged”', status:'New', start:[
    {role:'agent', html:`What’s going on with the bill?`},
    {gate:{ph:'Message billcheck…', primary:{label:'“Two Chairs charged my card $179 but never sent an itemized invoice.”'}}},
    {role:'agent', status:'Reviewed', card:()=>verdictCard({v:'dispute',
      title:`You were charged and you’re surprised — let’s dispute this.`,
      why:`This isn’t a “wait for the bill” situation — you’ve <b>already been charged</b>, with no itemized invoice and a service you say wasn’t delivered as described. That’s a dispute: first demand an itemized invoice + refund, and a card chargeback is your backstop.`,
      basis:['already charged','no itemized invoice','user disputes service']})},
    {role:'agent', html:`Quick check so I aim this right:`},
    {gate:{ph:'Reply…', primary:{label:'It was billed to my insurance / HSA card'},
      asides:[{label:'It was a normal credit card', reply:`Then the card chargeback path is clean. Either way I’ll start with the refund demand — chargebacks go smoother once you’ve asked and been refused.`}]}},
    {role:'agent', card:()=>verdictCard({v:'dispute',
      title:`Plan: refund demand now, chargeback ready.`,
      why:`I’ll draft a short, firm note asking Two Chairs for an itemized invoice and a full $179 refund within a set deadline. If they refuse or go quiet, we file the chargeback and (if it hit your plan) flag it to your insurer as a billing-accuracy issue.`,
      options:[
        {rank:'1.',text:'Draft the refund demand (with a deadline)',odds:'best first'},
        {rank:'2.',text:'Prep the chargeback packet (backstop)',odds:'ready'},
        {rank:'3.',text:'Flag to insurer as billing inaccuracy',odds:'if on plan'}]})},
    {gate:{ph:'Reply…', primary:{label:'✍️ Draft the refund demand'}, asides:[]}},
    {role:'agent', status:'Acting', html:`On it — I’ll keep the whole thread as your evidence trail in case it goes to a chargeback.`},
  ]},
};

/* ---------- engine ---------- */
const thread=document.getElementById('thread'), chips=document.getElementById('chips'),
      statusEl=document.getElementById('status'), phEl=document.getElementById('ph');
let cur='c1', idx=0;

function el(html){const d=document.createElement('div');d.innerHTML=html;return d.firstElementChild;}
function scroll(){thread.scrollTop=thread.scrollHeight;}
function setStatus(s){if(s)statusEl.textContent=s;}
function clearChips(){chips.innerHTML='';}
const wait=ms=>new Promise(r=>setTimeout(r,ms));

function addAgent(inner){const r=el(`<div class="row agent"><div></div></div>`);
  const wrap=r.firstElementChild; wrap.innerHTML=(typeof inner==='function')?inner():`<div class="bub">${inner}</div>`;
  // if the inner is a card (starts with card div) it's already block; otherwise it's a bubble
  thread.appendChild(r); scroll();}
function addUser(label,docs){const r=el(`<div class="row user"></div>`);
  r.innerHTML=`<div class="bub">${docs?docHTML(docs):label}</div>`; thread.appendChild(r); scroll();}
async function typing(){const t=el(`<div class="row agent"><div class="bub typing"><i></i><i></i><i></i></div></div>`);
  thread.appendChild(t);scroll();await wait(620);t.remove();}

async function run(){
  const steps=CASES[cur].start;
  while(idx<steps.length){
    const s=steps[idx];
    if(s.gate){await renderGate(s.gate);return;}
    if(s.role==='agent'){await typing(); setStatus(s.status); addAgent(s.card?s.card:s.html);}
    idx++;
  }
}
async function renderGate(g){
  clearChips(); phEl.textContent=g.ph||'Message billcheck…';
  if(g.card){ await typing(); addAgent(g.card); return; }   // confirm-style gate: the card holds its own buttons
  const p=el(`<button class="chip primary">${g.primary.label}</button>`);
  p.onclick=async()=>{clearChips(); addUser(g.primary.label,g.primary.docs); idx++; await run();};
  chips.appendChild(p);
  (g.asides||[]).forEach(a=>{const b=el(`<button class="chip ghost">${a.label}</button>`);
    b.onclick=async()=>{addUser(a.label); await typing(); addAgent(a.reply);};
    chips.appendChild(b);});
}

// delegate clicks for confirm-card buttons (Approve / Edit / Cancel)
thread.addEventListener('click', async (e)=>{
  const ap=e.target.closest('[data-approve]'); const as=e.target.closest('[data-aside]');
  if(ap){ap.closest('.cbtns').querySelectorAll('button').forEach(b=>b.disabled=true);
    addUser('✓ Approve & send'); idx++; await run();}
  else if(as){addUser(as.textContent.trim()); await typing(); addAgent(as.getAttribute('data-aside'));}
});

/* tabs */
const tabs=document.getElementById('cases');
Object.entries(CASES).forEach(([id,c])=>{const b=el(`<button class="casebtn${id==='c1'?' on':''}">${c.tab}</button>`);
  b.onclick=()=>load(id,b); tabs.appendChild(b);});
function load(id,btn){document.querySelectorAll('.casebtn').forEach(x=>x.classList.remove('on'));
  (btn||tabs.firstElementChild).classList.add('on');
  cur=id; idx=0; thread.innerHTML=''; clearChips(); setStatus(CASES[id].status); run();}

load('c1');
</script>
</body>
</html>
