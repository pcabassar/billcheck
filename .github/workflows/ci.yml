name: CI
on:
  push:
    branches: [main]
  pull_request:

# Greenfield V0.1 CI. The simulation harness runs offline via Node's TS type-stripping
# (no install, no key, no DB) — it's the provenance + false-OK gate as a report (exit 1
# on a never-event). App typecheck/build steps get added once the Next.js app + deps land.
# (V0's CI — lint/typecheck/test/engine-eval/build over the old workspace — is archived
# under archive/v0/ along with the code it gated.)
jobs:
  harness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: V0.1 simulation harness (provenance + false-OK, offline)
        run: node --experimental-strip-types apps/billcheck/eval/run.ts
