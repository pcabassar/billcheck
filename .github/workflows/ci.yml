name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Lint (plan invariants — PHI logger, LLM wrapper boundary, package purity)
        run: pnpm lint
      - name: Service-role key never in client paths
        run: |
          ! grep -r "SUPABASE_SERVICE_ROLE_KEY" apps/web/app --include='*.ts' --include='*.tsx' || (echo "service-role key found in client path" && exit 1)
      - run: pnpm typecheck
      - run: pnpm test
      - name: Engine eval (golden fixtures gate)
        run: pnpm eval
      - run: pnpm build
