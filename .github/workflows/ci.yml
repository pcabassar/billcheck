name: CI
on:
  push:
    branches: [main]
  pull_request:

# Greenfield V0.1 CI: install, run the simulation harness (the provenance + false-OK
# gates, as a report — exits non-zero on a never-event), typecheck, and build the app.
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Simulation harness (provenance + false-OK)
        run: pnpm --filter @billcheck/v01 eval
      - run: pnpm --filter @billcheck/v01 typecheck
      - run: pnpm --filter @billcheck/v01 build
